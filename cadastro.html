<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Escolar - Criar Conta</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-info">
            <h1>Organize seu dia com tranquilidade</h1>
            <p>Faça o seu cadastro para começar a estruturar sua rotina de estudos de forma eficiente.</p>
        </div>
        <div class="auth-card">
            <div class="logo-area"><div class="logo-box">📅</div></div>
            <h2 style="text-align:center; margin-bottom:20px;">Criar Conta</h2>
            <form id="cadForm">
                <div class="form-group"><label>👤 Nome completo</label><div class="input-wrapper"><input type="text" required placeholder="Digite seu nome"></div></div>
                <div class="form-group"><label>✉️ E-mail</label><div class="input-wrapper"><input type="email" required placeholder="seu@email.com"></div></div>
                <div class="form-group"><label>🔒 Senha</label><div class="input-wrapper"><input type="password" required placeholder="Digite sua senha"></div></div>
                <div class="form-group"><label>✓ Confirmar senha</label><div class="input-wrapper"><input type="password" required placeholder="Digite novamente"></div></div>
                <button type="submit" class="btn-primary">➔ Criar Conta</button>
            </form>
            <p style="text-align:center; font-size:0.85rem; margin-top:20px;">Já tem uma conta? <a href="index.html" style="color:var(--primary-color); font-weight:600; text-decoration:none;">Fazer login</a></p>
        </div>
    </div>
    <script src="js/cadastro.js"></script>
</body>
</html>
