<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Aluno</title>
    <style>
        /* Cole TODO o seu CSS original aqui dentro */
        /* E mantenha estas classes essenciais para o layout que você quer: */
        .dash-header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .week-nav-container { display: flex; justify-content: center; background: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .day-tab { padding: 10px 20px; cursor: pointer; text-align: center; }
        .day-tab.active { background: #3b82f6; color: white; border-radius: 10px; }
        .grid-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .progress-bar-fill { height: 10px; background: #3b82f6; border-radius: 5px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header class="dash-header">
        <div class="user-text">
            <h2 id="userName">Olá, Usuário!</h2>
            <p id="currentDate"></p>
        </div>
        <div class="header-actions">
            <button onclick="abrirConfig()">⚙️</button>
        </div>
    </header>

    <div class="week-nav-container" id="weekNav">
        </div>

    <div class="grid-layout">
        <div class="main-content">
            <div id="agoraCard" class="card">
                <h3>AGORA</h3>
                <h2 id="currentAula">Carregando...</h2>
                <div class="progress-bar-container"><div class="progress-bar-fill" id="progresso"></div></div>
            </div>
            <div id="proximaCard" class="card">
                <h3>PRÓXIMA ATIVIDADE</h3>
                <p id="nextAula">Carregando...</p>
            </div>
        </div>
        <div class="sidebar">
            <div class="card"><h3>GRADE</h3></div>
        </div>
    </div>
</div>

<script>
    // 1. Nome do Usuário via Email
    const userEmail = "aluno@exemplo.com";
    document.getElementById("userName").innerText = "Olá, " + userEmail.split('@')[0];

    // 2. Calendário Semanal Dinâmico
    const dias = ['segunda', 'terça', 'quarta', 'quinta', 'sexta'];
    const nav = document.getElementById('weekNav');
    dias.forEach((dia, i) => {
        nav.innerHTML += `<div class="day-tab ${i===2?'active':''}">${dia}<br><strong>${i+1}</strong></div>`;
    });

    // 3. Atualização de Progresso (Simulação)
    function atualizarDashboard() {
        document.getElementById("currentAula").innerText = "Matemática";
        document.getElementById("nextAula").innerText = "Intervalo";
        document.getElementById("progresso").style.width = "65%";
    }
    
    atualizarDashboard();
</script>
</body>
</html>
