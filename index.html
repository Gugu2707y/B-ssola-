<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        /* [Seu CSS original aqui...] */
        /* Estilos específicos para o Modal que você pediu */
        .modal { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 350px; }
        .modal-content input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
    </style>
</head>
<body>

<div class="dash-header">
    <div class="user-text">
        <h2 id="userNameDisplay">Olá, Usuário!</h2>
    </div>
</div>

<div class="week-nav-container">
    <div class="day-tab">segunda<br><strong>1</strong></div>
    <div class="day-tab">terça<br><strong>2</strong></div>
    <div class="day-tab active">quarta<br><strong>3</strong></div>
    <div class="day-tab">quinta<br><strong>4</strong></div>
    <div class="day-tab">sexta<br><strong>5</strong></div>
</div>

<div id="atividadesList">
    <div class="activity-item">
        <div>
            <strong>Matemática</strong><br><small>Prof. Maria | 10:00 - 10:50</small>
            <div class="progress-bar-container"><div class="progress-bar-fill" style="width: 65%;"></div></div>
        </div>
        <button onclick="abrirModal()">Editar</button>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>Editar Aula</h3>
        <input type="text" id="materiaInput" placeholder="Nome da Matéria">
        <input type="text" id="profInput" placeholder="Nome do Professor">
        <input type="time" id="inicioInput">
        <input type="time" id="fimInput">
        <button onclick="fecharModal()" style="width:100%; padding:10px; background:#3b82f6; color:white; border:none; border-radius:8px;">Concluir</button>
    </div>
</div>

<script>
    // Nome do Usuário fixo conforme e-mail
    const email = "usuario@email.com";
    document.getElementById("userNameDisplay").innerText = "Olá, " + email.split('@')[0];

    // Funções de controle
    function abrirModal() { document.getElementById("editModal").style.display = "flex"; }
    function fecharModal() { document.getElementById("editModal").style.display = "none"; }
</script>
</body>
</html>
