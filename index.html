<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Aluno</title>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ebf5ff; padding: 20px; }
        .dashboard-container { max-width: 1040px; margin: auto; }
        /* Adicione aqui o seu CSS original de 1000 linhas */
        
        /* Funcionalidades exigidas */
        .modal { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 999; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 300px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header class="dash-header">
        <div class="user-text">
            <h2 id="userNameDisplay">Olá, Usuário!</h2>
            <div class="current-full-date" id="dateDisplay"></div>
        </div>
    </header>

    <div class="week-nav-container">
        <button class="week-arrow" onclick="mudarDia(-1)">❮</button>
        <div class="week-days-grid" id="weekGrid"></div>
        <button class="week-arrow" onclick="mudarDia(1)">❯</button>
    </div>

    <div id="materiasList" class="meu-dia-container"></div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>Editar Atividade</h3>
        <input type="text" id="editNome" placeholder="Matéria">
        <input type="text" id="editProf" placeholder="Professor">
        <input type="time" id="editInicio">
        <input type="time" id="editFim">
        <button onclick="salvarAlteracoes()">Salvar</button>
    </div>
</div>

<script>
    // 1. Nome do Usuário
    const email = "joao.silva@escola.com";
    document.getElementById("userNameDisplay").innerText = "Olá, " + email.split('@')[0].replace('.', ' ');

    // 2. Lógica de Data e Calendário
    let dataAtual = new Date();
    function renderCalendario() {
        // Lógica de renderização dos dias da semana
        const grid = document.getElementById("weekGrid");
        grid.innerHTML = "<div>Seg...</div>"; // Preencha com sua lógica de datas
    }

    // 3. Progresso e Edição
    let atividades = [{nome: "Matemática", prof: "Prof. Maria", inicio: "08:00", fim: "12:00"}];
    
    function renderAtividades() {
        const container = document.getElementById("materiasList");
        container.innerHTML = atividades.map((atv, i) => `
            <div class="activity-item">
                <div>
                    <strong>${atv.nome}</strong><br><small>${atv.prof}</small>
                    <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-${i}"></div></div>
                </div>
                <button onclick="abrirModal(${i})">Editar</button>
            </div>
        `).join('');
    }

    function abrirModal(i) {
        document.getElementById("editModal").style.display = "flex";
        // Preencher inputs com valores atuais
    }

    function salvarAlteracoes() {
        // Lógica para salvar e atualizar o renderAtividades()
        document.getElementById("editModal").style.display = "none";
    }

    renderAtividades();
</script>
</body>
</html>
