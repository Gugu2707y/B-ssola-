<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧭 Bússola Dashboard</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: #f8fafc; }

        .dashboard-layout {
            max-width: 1200px;
            margin: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .dash-header {
            background: white;
            padding: 16px 20px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-action-icon {
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            background: #f1f5f9;
        }

        .toggle-btn-label {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f1f5f9;
            padding: 6px 10px;
            border-radius: 10px;
            cursor: pointer;
        }

        .status-alert-banner {
            background: #e0f2fe;
            padding: 14px;
            border-radius: 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            font-weight: 500;
        }

        .week-nav-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .week-selector-grid {
            display: flex;
            gap: 10px;
            flex: 1;
        }

        .week-day-card {
            flex: 1;
            background: white;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
        }

        .week-day-card.active {
            background: #3b82f6;
            color: white;
        }

        .dashboard-columns {
            display: flex;
            gap: 16px;
        }

        .column-left {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .column-right {
            flex: 1;
            background: white;
            padding: 16px;
            border-radius: 16px;
        }

        .info-block-card {
            background: white;
            padding: 16px;
            border-radius: 16px;
        }

        .progress-bar-wrapper {
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: #3b82f6;
        }

        .timeline-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .edit-panel {
            display: none;
            background: #fff7ed;
            padding: 14px;
            border-radius: 12px;
        }

        .edit-panel.active {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .edit-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .edit-field input {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .btn-save-box {
            background: #f97316;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="dashboard-layout">

    <!-- HEADER -->
    <div class="dash-header">
        <div>
            <h2 style="margin:0;">Olá, <span id="welcomeUser">Usuário</span>!</h2>
            <small>
                <span class="material-symbols-outlined" style="font-size:16px;">calendar_today</span>
                <span id="currentFullDate">Carregando data...</span>
            </small>
        </div>

        <div class="header-actions">
            <label class="toggle-btn-label">
                <input type="checkbox" id="checkEditMode">
                Configurar
            </label>

            <label class="toggle-btn-label">
                <input type="checkbox" id="checkFocusMode">
                Foco
            </label>

            <button id="logoutBtn" class="btn-action-icon">
                <span class="material-symbols-outlined">logout</span>
            </button>
        </div>
    </div>

    <!-- BANNER -->
    <div class="status-alert-banner" id="statusBanner">
        <span class="material-symbols-outlined">info</span>
        <span>Carregando status...</span>
    </div>

    <!-- SEMANA -->
    <div class="week-nav-container">
        <button class="btn-action-icon" id="btnPrevDay">
            <span class="material-symbols-outlined">arrow_back</span>
        </button>

        <div class="week-selector-grid" id="weekGrid"></div>

        <button class="btn-action-icon" id="btnNextDay">
            <span class="material-symbols-outlined">arrow_forward</span>
        </button>
    </div>

    <!-- CONTEÚDO -->
    <div class="dashboard-columns">

        <!-- ESQUERDA -->
        <div class="column-left">

            <div class="info-block-card">
                <span>📘 Agora</span>
                <h2 id="currentSubjectName">Verificando...</h2>
                <p id="currentSubjectMeta">--</p>

                <div class="progress-bar-wrapper">
                    <div class="progress-bar-fill" id="currentProgressFill"></div>
                </div>

                <small id="timeLeftText">--</small>
            </div>

            <div class="info-block-card">
                <span>🍕 Próxima</span>
                <h3 id="nextSubjectName">--</h3>
                <p id="nextSubjectMeta">--</p>
            </div>

            <div class="edit-panel" id="editPanel">
                <div class="edit-grid">
                    <div class="edit-field">
                        <input id="editInputName" placeholder="Matéria">
                    </div>
                    <div class="edit-field">
                        <input id="editInputRoom" placeholder="Sala">
                    </div>
                    <div class="edit-field">
                        <input id="editInputStart" placeholder="Início">
                    </div>
                    <div class="edit-field">
                        <input id="editInputEnd" placeholder="Fim">
                    </div>
                </div>

                <button class="btn-save-box" id="btnSaveEdit">Salvar</button>
            </div>

        </div>

        <!-- DIREITA -->
        <div class="column-right">

            <h3>📅 Calendário</h3>

            <div class="datepicker-container">
                <div class="datepicker-header">
                    <button class="btn-action-icon" id="prevMonth">‹</button>
                    <span id="calendarMonthYear">--</span>
                    <button class="btn-action-icon" id="nextMonth">›</button>
                </div>

                <div class="datepicker-grid" id="calendarDaysGrid"></div>
            </div>

            <h3 style="margin-top:20px;">⏱️ Grade</h3>
            <div class="timeline-container" id="timelineList"></div>

        </div>

    </div>

</div>

<script src="feriados.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
