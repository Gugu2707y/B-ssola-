<body>

<div class="dashboard-layout">

    <!-- CABEÇALHO -->
    <header class="dash-header">

        <div class="header-left">
            <h2 id="welcomeUserName">Olá, gugu2707y!</h2>

            <small>
                <span class="material-symbols-outlined">
                    calendar_today
                </span>

                <span id="textFullDate">
                    Carregando data...
                </span>
            </small>
        </div>

        <div class="header-actions">

            <label class="toggle-btn-label">
                <input type="checkbox" id="checkEditMode">
                Configurar Matérias
            </label>

            <label class="toggle-btn-label">
                <input type="checkbox" id="checkFocusMode">
                Foco
            </label>

            <button
                class="btn-action-icon"
                onclick="window.location.href='index.html'">

                <span class="material-symbols-outlined">
                    logout
                </span>

            </button>

        </div>

    </header>

    <!-- BANNER -->

    <div class="status-alert-banner" id="dashboardBanner">

        <span class="material-symbols-outlined" id="bannerIcon">
            info
        </span>

        <span id="bannerText">
            Calculando distância temporal...
        </span>

    </div>

    <!-- SEMANA -->

    <div class="week-nav-container">

        <button class="btn-action-icon" id="btnPrevDay">
            <span class="material-symbols-outlined">
                arrow_back
            </span>
        </button>

        <div class="week-selector-grid" id="weekContainer"></div>

        <button class="btn-action-icon" id="btnNextDay">
            <span class="material-symbols-outlined">
                arrow_forward
            </span>
        </button>

    </div>

    <!-- CONTEÚDO -->

    <div class="dashboard-columns">

        <!-- ESQUERDA -->

        <div class="column-left">

            <!-- AGORA -->

            <div class="info-block-card" id="nowCard">

                <span class="block-tag tag-blue">
                    📘 AGORA
                </span>

                <h2 id="currentSubjectName">
                    Verificando...
                </h2>

                <p id="currentSubjectMeta">
                    --
                </p>

                <div class="progress-bar-wrapper">
                    <div
                        class="progress-bar-fill"
                        id="currentProgressFill">
                    </div>
                </div>

                <small id="timeLeftText">
                    Calculando...
                </small>

            </div>

            <!-- PRÓXIMA -->

            <div class="info-block-card next-card">

                <span class="block-tag tag-yellow">
                    🍕 PRÓXIMA ATIVIDADE
                </span>

                <h3 id="nextSubjectName">
                    --
                </h3>

                <p id="nextSubjectMeta">
                    --
                </p>

            </div>

            <!-- EDITOR -->

            <div class="edit-panel" id="editPanel">

                <h4>
                    ✍️ Personalizar Esta Aula
                </h4>

                <div class="edit-grid">

                    <div class="edit-field">
                        <label>Nome da Matéria</label>
                        <input type="text" id="editInputName">
                    </div>

                    <div class="edit-field">
                        <label>Ambiente / Sala</label>
                        <input type="text" id="editInputRoom">
                    </div>

                    <div class="edit-field">
                        <label>Início</label>
                        <input
                            type="text"
                            id="editInputStart"
                            placeholder="07:30">
                    </div>

                    <div class="edit-field">
                        <label>Término</label>
                        <input
                            type="text"
                            id="editInputEnd"
                            placeholder="08:20">
                    </div>

                </div>

                <button
                    class="btn-save-box"
                    id="btnSaveEdit">

                    Salvar e Atualizar Dia

                </button>

            </div>

        </div>

        <!-- DIREITA -->

        <aside class="column-right">

            <h3>📅 Calendário 2026</h3>

            <div class="datepicker-container">

                <div class="datepicker-header">

                    <button
                        class="btn-action-icon"
                        id="prevMonth">

                        <span class="material-symbols-outlined">
                            chevron_left
                        </span>

                    </button>

                    <span id="calendarMonthYear">
                        Junho 2026
                    </span>

                    <button
                        class="btn-action-icon"
                        id="nextMonth">

                        <span class="material-symbols-outlined">
                            chevron_right
                        </span>

                    </button>

                </div>

                <div
                    class="datepicker-grid"
                    id="calendarDaysGrid">
                </div>

            </div>

            <h3 style="margin-top:25px;">
                ⏱️ Grade Completa
            </h3>

            <div
                class="timeline-container"
                id="timelineContainer">
            </div>

        </aside>

    </div>

</div>

<script src="feriados.js"></script>
<script src="dashboard.js"></script>

</body>
