<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🧭 Bússola - Dashboard</title>

  <link rel="stylesheet" href="css/style.css"/>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>

<body>

<div class="dashboard-container">

  <header class="dash-header">
    <div class="header-user-info">
      <div class="user-avatar-wrapper">
        <div class="compass-avatar">
          <div class="compass-pointer"></div>
          <div class="north">N</div>
          <div class="south">S</div>
        </div>
      </div>
      <div class="user-text">
        <h2>Olá, <span id="welcomeUser">Usuário</span>!</h2>
        <div class="current-full-date" id="textFullDate">
          <span class="material-icons-round">calendar_today</span> Carregando data...
        </div>
      </div>
    </div>

    <div class="header-actions">
      <button class="settings-trigger-btn" title="Configurar">
        <span class="material-icons-round">settings</span>
      </button>
      
      <label class="checkbox-btn-wrapper">
        <input type="checkbox" id="btn-foco">
        <span class="custom-checkbox-btn">
          <span class="material-icons-round icon-check">visibility_off</span> Foco
        </span>
      </label>
      
      <button class="logout-btn" onclick="window.location.href='index.html'" title="Sair">
        <span class="material-icons-round">logout</span>
      </button>
    </div>
  </header>

  <div class="status-alert-banner" id="statusBanner">
    <span class="material-icons-round header-alert-icon">info</span>
    <span id="bannerText">Carregando status...</span>
  </div>

  <div class="week-nav-container">
    <button class="week-arrow"><span class="material-icons-round">chevron_left</span></button>
    <div class="week-days-grid" id="weekGrid">
      </div>
    <button class="week-arrow"><span class="material-icons-round">chevron_right</span></button>
  </div>

  <div class="app-container" style="align-items: flex-start; gap: 20px; padding: 0; max-width: 100%;">

    <div style="flex: 2; display: flex; flex-direction: column; gap: 14px;">

      <div class="current-activity-card">
        <span class="card-tag tag-now">AGORA</span>
        <h2 class="activity-title" id="currentSubjectName">Verificando...</h2>
        <p class="activity-subtitle" id="currentSubjectMeta">--</p>

        <div style="height: 6px; background: #e2e8f0; border-radius: 10px; overflow: hidden; margin: 16px 0 8px 0;">
          <div style="height: 100%; width: 0%; background: #3b82f6; transition: width 0.4s ease;" id="currentProgressFill"></div>
        </div>

        <p class="timer-status-text" id="timeLeftText">--</p>
      </div>

      <div class="next-activity-card">
        <span class="tag-next">
          <span class="material-icons-round tag-icon">fast_forward</span> PRÓXIMA ATIVIDADE
        </span>
        <h3 class="next-activity-title" id="nextSubjectName">--</h3>
        <div class="next-activity-meta" id="nextSubjectMeta">--</div>
      </div>

    </div>

    <div class="current-activity-card" style="flex: 1; min-width: 280px; margin-bottom: 0;">
      <span class="card-tag tag-now" style="background: #f1f5f9; color: #475569;">
        <span class="material-icons-round" style="font-size: 12px; vertical-align: middle;">schedule</span> GRADE
      </span>
      <div id="timelineList" style="margin-top: 10px;">
        </div>
    </div>

  </div>

</div>

<script type="module" src="./js/dashboard.js"></script>
<script type="module" src="./js/feriados.js"></script>
</body>
</html>
