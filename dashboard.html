<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🧭 Bússola</title>

  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #f6f8fc;
      margin: 0;
      color: #0f172a;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* HEADER */
    .header {
      background: white;
      padding: 16px;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h2 {
      margin: 0;
      font-size: 18px;
    }

    .header small {
      color: #64748b;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      border: none;
      background: #eef2ff;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }

    .logout {
      background: #fee2e2;
      color: #b91c1c;
    }

    /* STATUS */
    .banner {
      background: #e0f2fe;
      padding: 14px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
    }

    /* NAV SEMANA */
    .week {
      display: flex;
      gap: 8px;
      justify-content: space-between;
    }

    .day {
      flex: 1;
      background: white;
      padding: 10px;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      font-size: 14px;
    }

    .day.active {
      background: #2563eb;
      color: white;
    }

    /* CARDS */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .card {
      background: white;
      padding: 14px;
      border-radius: 14px;
    }

    .progress {
      height: 6px;
      background: #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: #2563eb;
    }

    /* LADO */
    .side {
      background: white;
      padding: 14px;
      border-radius: 14px;
    }

    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 14px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div>
      <h2>Olá, <span id="welcomeUser">Usuário</span>!</h2>
      <small id="textFullDate">Carregando data...</small>
    </div>

    <div class="actions">
      <button class="btn">Configurar</button>
      <button class="btn">Foco</button>
      <button class="btn logout" onclick="window.location.href='index.html'">Sair</button>
    </div>
  </div>

  <!-- STATUS -->
  <div class="banner" id="statusBanner">
    <span>ℹ️</span>
    <span id="bannerText">Carregando status...</span>
  </div>

  <!-- SEMANA -->
  <div class="week" id="weekGrid"></div>

  <!-- CONTEÚDO -->
  <div class="layout">

    <!-- ESQUERDA -->
    <div class="grid">

      <div class="card">
        <h3>📘 Agora</h3>
        <h2 id="currentSubjectName">Verificando...</h2>
        <small id="currentSubjectMeta">--</small>

        <div class="progress">
          <div class="bar" id="currentProgressFill"></div>
        </div>

        <small id="timeLeftText">--</small>
      </div>

      <div class="card">
        <h3>🍕 Próxima</h3>
        <h3 id="nextSubjectName">--</h3>
        <small id="nextSubjectMeta">--</small>
      </div>

    </div>

    <!-- DIREITA -->
    <div class="side">
      <h3>📅 Grade</h3>
      <div id="timelineList"></div>
    </div>

  </div>

</div>

<script src="feriados.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
